<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Beauty Library — Peachy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="index.html" class="nav-logo">peachy<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shelf.html" class="active">My Beauty Library</a>
      <a href="feed.html">News Feed</a>
      <a href="articles.html">Articles</a>
      <div class="nav-account-menu">
        <button class="nav-account-btn">Account ▾</button>
        <div class="nav-account-dropdown">
          <a href="account.html">Go to my profile</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Shelf Page -->
  <main class="shelf-page">
    <div class="shelf-page-header">
      <div>
        <h1>My Beauty Library</h1>
        <p id="product-count">0 products</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
    </div>

    <!-- Filter tabs -->
    <div class="filter-bar">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="rotation">In Rotation</button>
      <button class="filter-tab" data-filter="want">Want to Try</button>
      <button class="filter-tab" data-filter="retired">Not for Me</button>
    </div>

    <!-- Filter + Sort bar -->
    <div class="filter-sort-bar">

      <!-- Filter button -->
      <div class="fs-menu-wrap" id="filter-wrap">
        <button class="fs-btn" id="filter-toggle-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          Filters
        </button>
        <div class="fs-panel" id="filter-panel">
          <button class="filter-clear-btn" id="filter-clear-btn">Clear all filters</button>
          <div class="fs-row">
            <label for="filter-category">Category</label>
            <select id="filter-category" onchange="applySecondaryFilters()">
              <option value="">All Categories</option>
              <option value="bodycare">Body Care</option>
              <option value="fragrance">Fragrance</option>
              <option value="haircare">Haircare</option>
              <option value="makeup">Makeup</option>
              <option value="skincare">Skincare</option>
              <option value="tools">Tools</option>
            </select>
          </div>
          <div class="fs-row">
            <label for="filter-brand">Brand</label>
            <select id="filter-brand" onchange="applySecondaryFilters()">
              <option value="">All Brands</option>
            </select>
          </div>
          <div class="fs-row">
            <label for="filter-rating">Rating</label>
            <select id="filter-rating" onchange="applySecondaryFilters()">
              <option value="0">All Ratings</option>
              <option value="5">★★★★★</option>
              <option value="4">★★★★</option>
              <option value="3">★★★</option>
              <option value="2">★★</option>
              <option value="1">★</option>
            </select>
          </div>
          <div class="fs-row">
            <label for="filter-ingredient">Ingredient</label>
            <select id="filter-ingredient" onchange="applySecondaryFilters()">
              <option value="">All Ingredients</option>
            </select>
          </div>
          <div class="fs-row">
            <label for="filter-friend-rating">Friends Rating</label>
            <select id="filter-friend-rating" onchange="applySecondaryFilters()">
              <option value="0">All Ratings</option>
              <option value="5">★★★★★</option>
              <option value="4">★★★★</option>
              <option value="3">★★★</option>
              <option value="2">★★</option>
              <option value="1">★</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Sort button -->
      <div class="fs-menu-wrap" id="sort-wrap">
        <button class="fs-btn" id="sort-toggle-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
          Sort
        </button>
        <div class="fs-panel" id="sort-panel">
          <button class="filter-clear-btn" id="sort-clear-btn">Clear</button>
          <button class="sort-option" data-sort="asc">A → Z</button>
          <button class="sort-option" data-sort="desc">Z → A</button>
        </div>
      </div>

    </div>

    <!-- Product grid -->
    <div class="product-grid" id="product-grid">
      <!-- Cards rendered by JS -->
    </div>
  </main>

  <!-- Add Product Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Add a Product</h2>

      <div class="form-group library-search-group">
        <label>Search Library</label>
        <div class="library-search-wrap">
          <input type="text" id="library-search" placeholder="Search existing products…" autocomplete="off"
                 oninput="onLibrarySearch(this.value)" onblur="setTimeout(hideLibrarySuggestions, 150)" />
          <div class="library-suggestions" id="library-suggestions" style="display:none"></div>
        </div>
        <p class="library-search-hint">Find a product others have added, or fill in the fields below to add a new one.</p>
      </div>

      <div class="form-group">
        <label>Brand</label>
        <input type="text" id="input-brand" placeholder="e.g. The Ordinary" />
      </div>

      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="input-name" placeholder="e.g. Niacinamide 10% + Zinc 1%" />
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="input-category">
          <option value="skincare">Skincare</option>
          <option value="makeup">Makeup</option>
          <option value="haircare">Haircare</option>
          <option value="bodycare">Body Care</option>
          <option value="fragrance">Fragrance</option>
          <option value="tools">Tools & Accessories</option>
        </select>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="input-status">
          <option value="rotation">In Rotation</option>
          <option value="want">Want to Try</option>
          <option value="retired">Not for Me</option>
        </select>
      </div>

      <div class="form-group">
        <label>Your Rating</label>
        <div class="modal-stars" id="modal-stars">
          <span class="star" data-val="1">★</span>
          <span class="star" data-val="2">★</span>
          <span class="star" data-val="3">★</span>
          <span class="star" data-val="4">★</span>
          <span class="star" data-val="5">★</span>
        </div>
      </div>

      <div class="form-group">
        <label>Product Image <span class="label-optional">(optional)</span></label>
        <div class="img-input-tabs">
          <button type="button" class="img-tab active" data-img-tab="url">Link</button>
          <button type="button" class="img-tab" data-img-tab="upload">Upload</button>
        </div>
        <div id="img-pane-url">
          <input type="url" id="input-image-url" placeholder="https://..." />
        </div>
        <div id="img-pane-upload" style="display:none">
          <label class="file-upload-label" for="input-image-file">Choose file…</label>
          <input type="file" id="input-image-file" accept="image/*" />
        </div>
        <div id="image-preview" style="display:none">
          <img id="image-preview-img" src="" alt="Preview" />
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="input-note" placeholder="What do you love (or not) about this product?"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addProduct()">Add to Library</button>
      </div>
    </div>
  </div>

  <footer>© 2026 Peachy · made with ♡ for beauty lovers</footer>

  <script src="auth.js"></script>
  <script>
    const _session = requireAuth();
    const _acctBtn = document.querySelector('.nav-account-btn');
    const _acctMenu = document.querySelector('.nav-account-menu');
    _acctBtn.addEventListener('click', e => { e.stopPropagation(); _acctMenu.classList.toggle('open'); });
    document.addEventListener('click', () => _acctMenu.classList.remove('open'));
</script>
  <script src="app.js"></script>
</body>
</html>
