<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Peachy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">

  <div class="login-card">

    <a href="login.html" class="nav-logo login-logo">peachy<span>.</span></a>
    <p class="login-tagline">Your beauty library, all in one place.</p>

    <div class="login-tabs">
      <button class="login-tab active" id="tab-login"  onclick="showPanel('login')">Log In</button>
      <button class="login-tab"        id="tab-signup" onclick="showPanel('signup')">Create Account</button>
    </div>

    <!-- Log In panel -->
    <div class="login-panel" id="panel-login">
      <div class="form-group">
        <label>Handle</label>
        <input type="text" id="login-handle" placeholder="@yourhandle" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <p class="login-error" id="login-error" style="display:none"></p>
      <button class="btn btn-primary login-submit" onclick="doLogin()">Log In</button>
    </div>

    <!-- Create Account panel -->
    <div class="login-panel" id="panel-signup" style="display:none">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="signup-name" placeholder="e.g. Ella" autocomplete="name" />
      </div>
      <div class="form-group">
        <label>Handle</label>
        <input type="text" id="signup-handle" placeholder="@yourhandle" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <p class="login-error" id="signup-error" style="display:none"></p>
      <button class="btn btn-primary login-submit" onclick="doSignup()">Create Account</button>
    </div>

  </div>

  <script src="auth.js"></script>
  <script>
    // Redirect immediately if already logged in
    (function () {
      const s = getSession();
      if (s && s.handle) location.replace('shelf.html');
    })();

    function showPanel(which) {
      document.getElementById('panel-login').style.display  = which === 'login'  ? '' : 'none';
      document.getElementById('panel-signup').style.display = which === 'signup' ? '' : 'none';
      document.getElementById('tab-login').classList.toggle('active',  which === 'login');
      document.getElementById('tab-signup').classList.toggle('active', which === 'signup');
      document.getElementById('login-error').style.display  = 'none';
      document.getElementById('signup-error').style.display = 'none';
    }

    function normalizeHandle(raw) {
      return raw.trim().toLowerCase().replace(/^@/, '');
    }

    function showError(el, msg) {
      el.textContent   = msg;
      el.style.display = '';
    }

    function doLogin() {
      const handle   = normalizeHandle(document.getElementById('login-handle').value);
      const password = document.getElementById('login-password').value;
      const errorEl  = document.getElementById('login-error');

      if (!handle || !password) {
        showError(errorEl, 'Please enter your handle and password.');
        return;
      }

      const account = _getAccounts().find(a => a.handle === handle);
      if (!account || account.password !== password) {
        showError(errorEl, 'Handle or password not recognized.');
        return;
      }

      localStorage.setItem('peachy-session', JSON.stringify({ handle }));
      location.href = 'shelf.html';
    }

    function doSignup() {
      const name     = document.getElementById('signup-name').value.trim();
      const handle   = normalizeHandle(document.getElementById('signup-handle').value);
      const password = document.getElementById('signup-password').value;
      const errorEl  = document.getElementById('signup-error');

      if (!name || !handle || !password) {
        showError(errorEl, 'Please fill in all fields.');
        return;
      }
      if (password.length < 4) {
        showError(errorEl, 'Password must be at least 4 characters.');
        return;
      }
      if (_getAccounts().find(a => a.handle === handle)) {
        showError(errorEl, 'That handle is already taken. Try another.');
        return;
      }

      const accounts = _getAccounts();
      accounts.push({ handle, name, password });
      _saveAccounts(accounts);

      // Pre-populate profile for this user
      localStorage.setItem(`peachy-profile-${handle}`, JSON.stringify({
        name,
        handle: '@' + handle,
        bio: 'Beauty lover. Building my library one product at a time.',
      }));

      localStorage.setItem('peachy-session', JSON.stringify({ handle }));
      location.href = 'shelf.html';
    }

    // Enter key submits the visible panel
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const loginVisible = document.getElementById('panel-login').style.display !== 'none';
      if (loginVisible) doLogin(); else doSignup();
    });
  </script>
</body>
</html>
