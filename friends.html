<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends — Memo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="index.html" class="nav-logo">memo<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shelf.html">My Shelf</a>
      <a href="friends.html" class="active">Friends</a>
      <a href="shelf.html" class="btn btn-primary" style="padding:.45rem 1.1rem">My Shelf</a>
    </div>
  </nav>

  <!-- Friends Page -->
  <main class="friends-page">

    <div class="friends-header">
      <div>
        <h1>Friends &amp; Influencers</h1>
        <p id="friends-subtitle">See what people you follow are reaching for.</p>
      </div>
      <button class="btn btn-outline" onclick="openFollowModal()">+ Follow Someone</button>
    </div>

    <!-- Filter tabs -->
    <div class="filter-bar">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="friend">Friends</button>
      <button class="filter-tab" data-filter="influencer">Influencers</button>
    </div>

    <!-- People grid -->
    <div class="people-grid" id="people-grid"></div>

    <!-- Shelf viewer -->
    <div class="shelf-viewer" id="shelf-viewer" style="display:none">
      <div class="shelf-viewer-header">
        <div class="shelf-viewer-meta">
          <span class="shelf-viewer-avatar" id="viewer-avatar"></span>
          <div>
            <h2 id="viewer-name"></h2>
            <p id="viewer-handle"></p>
          </div>
        </div>
        <button class="btn btn-ghost" onclick="closeShelf()">✕ Close</button>
      </div>

      <!-- Shelf filter tabs -->
      <div class="filter-bar" id="viewer-filter-bar">
        <button class="filter-tab active" data-vfilter="all">All</button>
        <button class="filter-tab" data-vfilter="rotation">In Rotation</button>
        <button class="filter-tab" data-vfilter="want">Want to Try</button>
        <button class="filter-tab" data-vfilter="retired">Retired</button>
      </div>

      <div class="product-grid" id="viewer-grid"></div>
    </div>

  </main>

  <!-- Follow Modal -->
  <div class="modal-overlay" id="follow-modal">
    <div class="modal">
      <h2>Follow Someone</h2>
      <div class="form-group">
        <label>Username or Handle</label>
        <input type="text" id="follow-input" placeholder="e.g. @sophiek" />
      </div>
      <p style="font-family:'Helvetica Neue',sans-serif;font-size:.82rem;color:var(--muted);margin-top:-.5rem;margin-bottom:1rem;">
        Try: @sophiek, @miaderm, @rinat, @jaker, or @lunav
      </p>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeFollowModal()">Cancel</button>
        <button class="btn btn-primary" onclick="followByHandle()">Follow</button>
      </div>
    </div>
  </div>

  <footer>© 2026 Memo · made with ♡ for beauty lovers</footer>

  <script src="friends.js"></script>
</body>
</html>
