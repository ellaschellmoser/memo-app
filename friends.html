<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends — Peachy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="index.html" class="nav-logo">peachy<span>.</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shelf.html">My Beauty Library</a>
      <a href="feed.html">News Feed</a>
      <a href="articles.html">Articles</a>
      <div class="nav-account-menu">
        <button class="nav-account-btn">Account ▾</button>
        <div class="nav-account-dropdown">
          <a href="account.html">Go to my profile</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Friends Page -->
  <main class="friends-page">

    <div class="friends-header">
      <div>
        <h1>Friends</h1>
        <p id="friends-subtitle">See what people you follow are reaching for.</p>
      </div>
      <button class="btn btn-outline" onclick="openFollowModal()">+ Follow Someone</button>
    </div>

    <!-- Filter tabs -->
    <div class="filter-bar">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab" data-filter="following">Following</button>
      <button class="filter-tab" data-filter="followers">Followers</button>
    </div>

    <!-- People grid -->
    <div class="people-grid" id="people-grid"></div>

    <!-- Shelf viewer -->
    <div class="shelf-viewer" id="shelf-viewer" style="display:none">
      <div class="shelf-viewer-header">
        <div class="shelf-viewer-meta">
          <span class="shelf-viewer-avatar" id="viewer-avatar"></span>
          <div>
            <h2 id="viewer-name"></h2>
            <p id="viewer-handle"></p>
          </div>
        </div>
        <button class="btn btn-ghost" onclick="closeShelf()">✕ Close</button>
      </div>

      <!-- Shelf filter tabs -->
      <div class="filter-bar" id="viewer-filter-bar">
        <button class="filter-tab active" data-vfilter="all">All</button>
        <button class="filter-tab" data-vfilter="rotation">In Rotation</button>
        <button class="filter-tab" data-vfilter="want">Want to Try</button>
        <button class="filter-tab" data-vfilter="retired">Not for Me</button>
      </div>

      <!-- Secondary filters -->
      <div class="secondary-filters">
        <select id="viewer-filter-category" onchange="applyViewerSecondaryFilters()">
          <option value="">All Categories</option>
          <option value="skincare">Skincare</option>
          <option value="makeup">Makeup</option>
          <option value="haircare">Haircare</option>
          <option value="bodycare">Body Care</option>
          <option value="fragrance">Fragrance</option>
          <option value="tools">Tools</option>
        </select>
        <select id="viewer-filter-rating" onchange="applyViewerSecondaryFilters()">
          <option value="0">All Ratings</option>
          <option value="5">★★★★★</option>
          <option value="4">★★★★+</option>
          <option value="3">★★★+</option>
        </select>
      </div>

      <div class="product-grid" id="viewer-grid"></div>
    </div>

  </main>

  <!-- Follow Modal -->
  <div class="modal-overlay" id="follow-modal">
    <div class="modal">
      <h2>Follow Someone</h2>
      <div class="form-group">
        <label>Username or Handle</label>
        <input type="text" id="follow-input" placeholder="@handle" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeFollowModal()">Cancel</button>
        <button class="btn btn-primary" onclick="followByHandle()">Follow</button>
      </div>
    </div>
  </div>

  <footer>© 2026 Peachy · made with ♡ for beauty lovers</footer>

  <script src="auth.js"></script>
  <script>
    const _session = requireAuth();
    const _acctBtn = document.querySelector('.nav-account-btn');
    const _acctMenu = document.querySelector('.nav-account-menu');
    _acctBtn.addEventListener('click', e => { e.stopPropagation(); _acctMenu.classList.toggle('open'); });
    document.addEventListener('click', () => _acctMenu.classList.remove('open'));
</script>
  <script src="friends.js"></script>
</body>
</html>
